name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build binary
        run: |
          VERSION="${GITHUB_REF_NAME}"
          CGO_LDFLAGS="-framework UniformTypeIdentifiers" \
            go build -tags "desktop,production" \
            -ldflags "-s -w -X main.version=$VERSION" \
            -o build/bacalhau-bin .

      - name: Build .app bundle
        run: |
          VERSION="${GITHUB_REF_NAME}"
          APP="build/Bacalhau.app"
          CONTENTS="$APP/Contents"
          mkdir -p "$CONTENTS/MacOS" "$CONTENTS/Resources"

          # Icon: PNG → iconset → icns
          ICONSET="build/icon.iconset"
          mkdir -p "$ICONSET"
          for SIZE in 16 32 128 256 512; do
            sips -z $SIZE $SIZE icons/icon.png --out "$ICONSET/icon_${SIZE}x${SIZE}.png" >/dev/null 2>&1
            DOUBLE=$((SIZE * 2))
            sips -z $DOUBLE $DOUBLE icons/icon.png --out "$ICONSET/icon_${SIZE}x${SIZE}@2x.png" >/dev/null 2>&1
          done
          sips -z 1024 1024 icons/icon.png --out "$ICONSET/icon_512x512@2x.png" >/dev/null 2>&1
          iconutil -c icns "$ICONSET" -o "$CONTENTS/Resources/icon.icns"

          # Info.plist
          sed "s/__VERSION__/$VERSION/g" packaging/macos/Info.plist.template \
            | sed 's|<string>launcher</string>|<string>Bacalhau</string>|' \
            > "$CONTENTS/Info.plist"

          # Binary
          cp build/bacalhau-bin "$CONTENTS/MacOS/Bacalhau"
          chmod +x "$CONTENTS/MacOS/Bacalhau"

          # Ad-hoc code sign + remove quarantine
          codesign --force --deep -s - "$APP"
          xattr -cr "$APP"

          # Zip
          cd build
          zip -r "Bacalhau-${VERSION}-macos.zip" Bacalhau.app

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: build/Bacalhau-*-macos.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install webkit2gtk
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev

      - name: Build binary
        run: |
          VERSION="${GITHUB_REF_NAME}"
          go build -tags "desktop,production,webkit2_41" \
            -ldflags "-s -w -X main.version=$VERSION" \
            -o build/Bacalhau .

      - name: Package tarball
        run: |
          VERSION="${GITHUB_REF_NAME}"
          cd build
          tar czf "Bacalhau-${VERSION}-linux-amd64.tar.gz" Bacalhau

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: build/Bacalhau-*-linux-amd64.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build binary
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          go build -tags "desktop,production" \
            -ldflags "-s -w -X main.version=$VERSION -H windowsgui" \
            -o build/Bacalhau.exe .

      - name: Package zip
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          cd build
          7z a "Bacalhau-${VERSION}-windows-amd64.zip" Bacalhau.exe

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: build/Bacalhau-*-windows-amd64.zip

  release:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Bacalhau-*-macos.zip
            Bacalhau-*-linux-amd64.tar.gz
            Bacalhau-*-windows-amd64.zip
          generate_release_notes: true
